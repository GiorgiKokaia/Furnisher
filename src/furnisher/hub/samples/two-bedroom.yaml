name: Two-bedroom fixture
ceiling_height: 2.7
rooms:
  - id: kitchen
    type: kitchen
    rect: [0, 0, 3.5, 2.5]
  - id: bathroom
    type: bathroom
    rect: [0, 2.5, 3.5, 1.5]
  - id: hallway
    type: hallway
    rect: [3.5, 0, 2.0, 4.0]
  - id: living-room
    type: living_room
    rect: [5.5, 0, 3.5, 4.0]
  - id: bedroom-1
    type: bedroom
    rect: [0, 4, 4.5, 3.0]
  - id: bedroom-2
    type: bedroom
    rect: [4.5, 4, 4.5, 3.0]
openings:
  - id: door-entrance
    kind: door
    room: hallway
    edge: 0            # bottom edge (3.5,0)->(5.5,0), exterior
    offset_frac: 0.5
    width: 1.0
    swing: inward_left
    connects: exterior
  - id: door-hall-kitchen
    kind: door
    room: hallway
    edge: 3            # left edge (3.5,4)->(3.5,0)
    offset: 2.0        # spans y 2.0 .. 1.2
    width: 0.8
    swing: outward_left
    connects: kitchen
  - id: door-hall-bath
    kind: door
    room: hallway
    edge: 3            # left edge, spans y 3.5 .. 2.7
    offset: 0.5
    width: 0.8
    swing: outward_right
    connects: bathroom
  - id: opening-hall-living
    kind: opening
    room: hallway
    edge: 1            # right edge (5.5,0)->(5.5,4)
    offset: 1.5
    width: 1.2
    connects: living-room
  - id: door-hall-bedroom-1
    kind: door
    room: hallway
    edge: 2            # top edge (5.5,4)->(3.5,4), spans x 4.4 .. 3.6
    offset: 1.1
    width: 0.8
    swing: outward_right
    connects: bedroom-1
  - id: door-hall-bedroom-2
    kind: door
    room: hallway
    edge: 2            # top edge, spans x 5.4 .. 4.6
    offset: 0.1
    width: 0.8
    swing: outward_left
    connects: bedroom-2
  - id: window-living
    kind: window
    room: living-room
    edge: 1            # right edge (9,0)->(9,4)
    offset_frac: 0.5
    width: 2.0
    sill_height: 0.85
  - id: window-kitchen
    kind: window
    room: kitchen
    edge: 3            # left edge (0,2.5)->(0,0)
    offset_frac: 0.5
    width: 1.2
    sill_height: 1.1
  - id: window-bath
    kind: window
    room: bathroom
    edge: 3            # left edge (0,4)->(0,2.5)
    offset_frac: 0.5
    width: 0.6
    sill_height: 1.3
  - id: window-bedroom-1
    kind: window
    room: bedroom-1
    edge: 2            # top edge (4.5,7)->(0,7)
    offset_frac: 0.5
    width: 1.8
    sill_height: 0.85
  - id: window-bedroom-2
    kind: window
    room: bedroom-2
    edge: 2            # top edge (9,7)->(4.5,7)
    offset_frac: 0.5
    width: 1.8
    sill_height: 0.85
