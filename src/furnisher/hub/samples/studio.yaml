name: Studio fixture
ceiling_height: 2.6
rooms:
  - id: main
    type: living_room
    rect: [0, 0, 5.0, 4.0]
  - id: bathroom
    type: bathroom
    rect: [5.0, 0, 2.0, 2.2]
  - id: entry
    type: hallway
    rect: [5.0, 2.2, 2.0, 1.8]
openings:
  - id: door-entrance
    kind: door
    room: entry
    edge: 1            # right edge (7,2.2)->(7,4), exterior wall
    offset_frac: 0.5
    width: 0.9
    swing: inward_left
    connects: exterior
  - id: door-entry-main
    kind: door
    room: main
    edge: 1            # right edge (5,0)->(5,4)
    offset: 2.5
    width: 0.9
    swing: inward_right
    connects: entry
  - id: door-main-bath
    kind: door
    room: bathroom
    edge: 3            # left edge (5,2.2)->(5,0)
    offset: 0.6
    width: 0.8
    swing: inward_left
    connects: main
  - id: window-main-south
    kind: window
    room: main
    edge: 0            # bottom edge (0,0)->(5,0)
    offset_frac: 0.5
    width: 1.8
    sill_height: 0.85
  - id: window-main-west
    kind: window
    room: main
    edge: 3            # left edge (0,4)->(0,0)
    offset_frac: 0.5
    width: 1.2
    sill_height: 0.85
  - id: window-bath
    kind: window
    room: bathroom
    edge: 0            # bottom edge (5,0)->(7,0)
    offset_frac: 0.5
    width: 0.6
    sill_height: 1.3
