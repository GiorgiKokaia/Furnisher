<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Furnisher</title>
<style>
  :root {
    --ink: #17161a; --bg: #f7f6f4; --surface: #fff; --border: #e7e5e0;
    --text: #1c1b1f; --muted: #78736c; --faint: #a8a29a;
    --accent: #2f6fed; --accent-hi: #1f5fe0; --danger: #b4453c;
    --r: 12px; --shadow: 0 1px 2px rgba(20,20,24,0.04), 0 4px 12px rgba(20,20,24,0.05);
    --ease: 160ms cubic-bezier(0.2, 0, 0.2, 1);
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body { font-family: system-ui, 'Segoe UI Variable', 'Segoe UI', sans-serif; font-size: 14px;
         color: var(--text); display: flex; flex-direction: column; background: var(--bg);
         -webkit-font-smoothing: antialiased; }
  header { display: flex; align-items: center; gap: 12px; padding: 0 16px; height: 52px;
           background: var(--ink); color: #f4f3f1; }
  header .brand { font-weight: 650; letter-spacing: -0.01em; }
  header #projName { color: #b9b4ad; font-size: 13px; }
  header .spacer { flex: 1; }
  header .budget { color: #d5d1cb; font-size: 13px; font-variant-numeric: tabular-nums; }
  header .tags { display: flex; gap: 6px; }
  header .tag { background: rgba(255,255,255,0.09); color: #dcd8d2; border-radius: 999px;
                padding: 3px 10px; font-size: 11.5px;
                box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08); }
  main { flex: 1; display: flex; min-height: 0; }
  #left { flex: 1.3; display: flex; flex-direction: column; min-width: 0;
          border-right: 1px solid var(--border); }
  #planBox { flex: 1; overflow: auto; background: var(--surface); padding: 14px; }
  #planBox svg { max-width: 100%; height: auto; display: block; margin: 0 auto; }
  #gallery { display: flex; gap: 10px; padding: 12px; overflow-x: auto; background: var(--bg);
             border-top: 1px solid var(--border); min-height: 124px; align-items: center; }
  #gallery img { height: 100px; border-radius: 10px; cursor: pointer; border: 1px solid var(--border);
                 box-shadow: var(--shadow); transition: transform var(--ease); }
  #gallery img:hover { transform: translateY(-2px); }
  #gallery .hint { color: var(--faint); font-size: 13px; padding: 0 8px; }
  #right { flex: 1; display: flex; flex-direction: column; min-width: 340px; max-width: 520px;
           background: var(--surface); }
  #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { padding: 10px 14px; border-radius: 14px; max-width: 92%; white-space: pre-wrap;
         line-height: 1.5; }
  .msg.user { background: var(--accent); color: #fff; align-self: flex-end;
              border-bottom-right-radius: 4px; }
  .msg.assistant { background: #f4f2ef; align-self: flex-start; border-bottom-left-radius: 4px; }
  .msg.pending { color: var(--muted); }
  .msg.pending::after { content: ""; display: inline-block; width: 10px; height: 10px;
    margin-left: 8px; border: 2px solid var(--accent); border-top-color: transparent;
    border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .optionCard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
    padding: 12px 13px; align-self: flex-start; max-width: 95%; box-shadow: var(--shadow); }
  .optionCard h4 { font-size: 13.5px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 2px; }
  .optionCard .total { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
  .optionCard .mini { background: var(--bg); border: 1px solid var(--border); border-radius: 9px;
    padding: 8px; margin-bottom: 9px; text-align: center; }
  .optionCard .mini svg { max-width: 100%; height: auto; max-height: 180px; }
  .optionCard .mini .miniNote { font-size: 10px; color: #a06a2c; margin-top: 3px; }
  .optionCard .items { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .optionCard .item { width: 84px; font-size: 10px; color: var(--muted); text-align: center; }
  .optionCard .item img, .thumbRow img, .optionCard .noimg {
    width: 76px; height: 76px; object-fit: cover; border-radius: 9px;
    border: 1px solid var(--border); background: var(--bg); }
  .optionCard .noimg { display: flex; align-items: center; justify-content: center;
    color: var(--faint); font-size: 10px; padding: 4px; }
  .optionCard button { font: inherit; font-size: 13px; font-weight: 550; padding: 7px 14px;
    border: 0; border-radius: 9px; background: var(--accent); color: #fff; cursor: pointer;
    transition: background var(--ease); }
  .optionCard button:hover:not(:disabled) { background: var(--accent-hi); }
  .optionCard button:disabled { background: #c9c5be; }
  .thumbRow { display: flex; gap: 6px; align-self: flex-start; flex-wrap: wrap; }
  .thumbRow img { cursor: pointer; }
  #composer { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--border);
              background: var(--surface); }
  #composer input { flex: 1; font: inherit; padding: 10px 13px; border: 1px solid var(--border);
    border-radius: 10px; background: var(--bg); color: var(--text);
    transition: border-color var(--ease), background var(--ease); }
  #composer input:focus { outline: 0; background: var(--surface); border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(47,111,237,0.13); }
  #composer input::placeholder { color: var(--faint); }
  #composer button, #toolRow button {
    font: inherit; font-size: 13px; font-weight: 550; padding: 9px 16px; border: 0;
    border-radius: 10px; background: var(--accent); color: #fff; cursor: pointer;
    transition: background var(--ease); }
  #composer button:hover:not(:disabled) { background: var(--accent-hi); }
  #composer button:disabled { background: #a9bfe8; }
  #toolRow { display: flex; gap: 6px; padding: 10px 12px; background: var(--surface);
             border-top: 1px solid var(--border); flex-wrap: wrap; }
  #toolRow button { background: #f4f2ef; color: #423e39; padding: 6px 11px; font-size: 12px;
                    box-shadow: inset 0 0 0 1px var(--border); }
  #toolRow button:hover { background: #eae7e2; }
  #issues { padding: 8px 12px; font-size: 12px; color: var(--danger); background: #fcf2f1;
            border-top: 1px solid #f0dcd9; max-height: 90px; overflow-y: auto; }
  #issues:empty { display: none; }
  #planBox [data-pid] { cursor: pointer; }
  /* labels and ticks must not swallow clicks meant for the piece under them */
  #planBox text, #planBox polyline { pointer-events: none; }
  #planBox [data-pid].selected { stroke: var(--accent); stroke-width: 3.5; }
  #pieceBar { position: absolute; display: flex; align-items: center; gap: 4px; background: var(--ink);
              padding: 6px; border-radius: 11px; box-shadow: 0 8px 28px rgba(20,20,24,0.28);
              z-index: 5; }
  #pieceBar .pieceThumb { width: 42px; height: 42px; object-fit: cover; border-radius: 7px;
              background: #35333a; cursor: pointer; }
  #pieceBar button { background: rgba(255,255,255,0.09); border: 0; color: #eceae7;
                     border-radius: 7px; padding: 5px 9px; cursor: pointer; font-size: 14px;
                     transition: background var(--ease); }
  #pieceBar button:hover { background: rgba(255,255,255,0.18); }
  #pieceBar .name { color: #b9b4ad; font-size: 12px; align-self: center; padding: 0 6px; }
  #left { position: relative; }
  #overlay { position: fixed; inset: 0; background: rgba(16,16,20,0.82); display: flex;
             align-items: center; justify-content: center; z-index: 10;
             backdrop-filter: blur(3px); }
  #overlay img { max-width: 94vw; max-height: 94vh; border-radius: 12px;
                 box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
  a:focus-visible, button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
</style>
</head>
<body>
<header>
  <a class="brand" href="/" title="Back to layouts" style="color:inherit;text-decoration:none">☰ Furnisher</a>
  <span id="projName"></span>
  <span class="tags" id="styleTags"></span>
  <span class="spacer"></span>
  <span class="budget" id="budget"></span>
</header>
<main>
  <div id="left">
    <div id="planBox"></div>
    <div id="gallery"><span class="hint">room photos appear here — try “show me the bedroom”
      or the room buttons below</span></div>
  </div>
  <div id="right">
    <div id="chat"></div>
    <div id="issues"></div>
    <div id="toolRow"></div>
    <div id="composer">
      <input id="input" placeholder="furnish the bedroom, scandinavian, budget 1500…" autofocus>
      <button id="send">Send</button>
    </div>
  </div>
</main>
<script>
"use strict";
const $ = id => document.getElementById(id);
let busy = false;
let selectedPid = null;
let placements = [];  // current placed items (from state), for the piece popup

// --- click-to-adjust + drag placements ---
let svgScale = 80;  // px per meter, refreshed from state
let dragState = null;

function attachPieceHandlers() {
  document.querySelectorAll("#planBox [data-pid]").forEach(el => {
    el.addEventListener("pointerdown", e => {
      e.preventDefault();
      e.stopPropagation();
      const svg = el.ownerSVGElement;
      const factor = svg.viewBox.baseVal.width / svg.getBoundingClientRect().width;
      dragState = {el, pid: el.getAttribute("data-pid"), startX: e.clientX, startY: e.clientY,
                   factor, moved: false};
    });
  });
  highlightSelected();
}

window.addEventListener("pointermove", e => {
  if (!dragState) return;
  const dx = (e.clientX - dragState.startX) * dragState.factor;
  const dy = (e.clientY - dragState.startY) * dragState.factor;
  if (Math.abs(dx) + Math.abs(dy) > 3) dragState.moved = true;
  if (dragState.moved) dragState.el.setAttribute("transform", `translate(${dx} ${dy})`);
});

window.addEventListener("pointerup", async e => {
  if (!dragState) return;
  const d = dragState;
  dragState = null;
  if (!d.moved) { selectPiece(d.pid); return; }
  d.el.removeAttribute("transform");
  const dxWorld = (e.clientX - d.startX) * d.factor / svgScale;
  const dyWorld = -((e.clientY - d.startY) * d.factor) / svgScale;  // svg y-down, world y-up
  selectedPid = d.pid;
  const resp = await fetch("api/placement", {method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({id: d.pid, action: "move", dx: dxWorld, dy: dyWorld})});
  const body = await resp.json();
  if (body.error && !body.state) { addMsg("assistant", "error: " + body.error); return; }
  if (body.error) addMsg("assistant", "⚠ " + body.error);
  applyState(body.state);
});

function highlightSelected() {
  document.querySelectorAll("#planBox [data-pid]").forEach(el =>
    el.classList.toggle("selected", el.getAttribute("data-pid") === selectedPid));
  const bar = $("pieceBar");
  if (bar) bar.remove();
  if (!selectedPid) return;
  const el = document.querySelector(`#planBox [data-pid="${selectedPid}"]`);
  if (!el) { selectedPid = null; return; }
  const bar2 = document.createElement("div");
  bar2.id = "pieceBar";
  const p = placements.find(pl => pl.id === selectedPid);
  if (p && p.image) {
    const thumb = document.createElement("img");
    thumb.className = "pieceThumb";
    thumb.src = p.image;
    thumb.title = "click to enlarge";
    thumb.addEventListener("click", () => showOverlay(p.image));
    thumb.onerror = () => thumb.remove();
    bar2.append(thumb);
  }
  const name = document.createElement("span");
  name.className = "name";
  name.textContent = p ? `${p.item} · ${p.dims}` : selectedPid;
  if (p) name.title = `${p.item} — ${Math.round(p.price)} ${p.currency}`;
  bar2.append(name);
  const actions = [
    ["←", () => movePiece(-0.1, 0)], ["→", () => movePiece(0.1, 0)],
    ["↑", () => movePiece(0, 0.1)], ["↓", () => movePiece(0, -0.1)],
    ["⟳", () => pieceAction({action: "rotate"})],
    ["⇄ replace", () => replaceSelected()],
    ["🗑", () => pieceAction({action: "delete"})],
    ["✕", () => selectPiece(null)],
  ];
  actions.forEach(([label, fn]) => {
    const b = document.createElement("button");
    b.textContent = label;
    b.addEventListener("click", fn);
    bar2.append(b);
  });
  const box = el.getBoundingClientRect();
  const left = $("left").getBoundingClientRect();
  document.getElementById("left").append(bar2);
  bar2.style.left = Math.max(6, box.left - left.left) + "px";
  bar2.style.top = Math.max(6, box.top - left.top - 60) + "px";
}

function selectPiece(pid) {
  selectedPid = pid === selectedPid ? null : pid;
  highlightSelected();
}

function movePiece(dx, dy) { pieceAction({action: "move", dx, dy}); }

function replaceSelected() {
  if (!selectedPid || busy) return;
  const p = placements.find(pl => pl.id === selectedPid);
  const label = p ? p.item : selectedPid;
  const how = prompt(`Replace “${label}” with… (e.g. a cheaper one, darker wood, smaller)`);
  if (how === null) return;
  selectPiece(null);
  sendText(`replace the ${label}` + (how.trim() ? ` with ${how.trim()}` : ""));
}

async function pieceAction(payload) {
  if (!selectedPid || busy) return;
  const resp = await fetch("api/placement", {method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({id: selectedPid, ...payload})});
  const body = await resp.json();
  if (body.error && !body.state) { addMsg("assistant", "error: " + body.error); return; }
  if (payload.action === "delete") selectedPid = null;
  if (body.error) addMsg("assistant", "⚠ " + body.error);
  applyState(body.state);
}

window.addEventListener("keydown", e => {
  if (!selectedPid || ["INPUT", "TEXTAREA"].includes(e.target.tagName)) return;
  const map = {ArrowLeft: [-0.1, 0], ArrowRight: [0.1, 0], ArrowUp: [0, 0.1], ArrowDown: [0, -0.1]};
  if (map[e.key]) { e.preventDefault(); movePiece(...map[e.key]); }
  else if (e.key === "r") pieceAction({action: "rotate"});
  else if (e.key === "Delete") pieceAction({action: "delete"});
  else if (e.key === "Escape") selectPiece(null);
});

function applyState(s) {
  svgScale = s.svg_scale || 80;
  placements = s.placements || [];
  $("projName").textContent = s.name;
  const tags = $("styleTags");
  tags.innerHTML = "";
  (s.style_tags || []).slice(0, 4).forEach(tag => {
    const el = document.createElement("span");
    el.className = "tag";
    el.textContent = tag;
    tags.append(el);
  });
  $("budget").textContent = s.budget
    ? `${Math.round(s.spent)} / ${Math.round(s.budget)} ${s.currency}`
    : `${Math.round(s.spent)} ${s.currency} spent (no budget set)`;
  $("planBox").innerHTML = s.svg;
  attachPieceHandlers();
  $("issues").textContent = s.issues.join("\n");
  const gallery = $("gallery");
  gallery.innerHTML = "";
  if (!s.room_images.length) {
    gallery.innerHTML = '<span class="hint">room photos appear here</span>';
  }
  s.room_images.forEach(name => {
    const img = document.createElement("img");
    img.src = "renders/rooms/" + name + "?t=" + Date.now();
    img.title = name;
    img.addEventListener("click", () => showOverlay(img.src));
    gallery.append(img);
  });
  const tools = $("toolRow");
  tools.innerHTML = "";
  const undo = document.createElement("button");
  undo.textContent = "↩ undo";
  undo.addEventListener("click", async () => {
    const r = await fetch("api/undo", {method: "POST"});
    applyState((await r.json()).state);
  });
  tools.append(undo);
  const inspire = document.createElement("button");
  inspire.textContent = "✨ IKEA inspiration";
  inspire.title = "pull styled IKEA room photos for a query and extract a style profile";
  inspire.addEventListener("click", async () => {
    const query = prompt("What should the inspiration look like?", "scandinavian bedroom");
    if (!query || busy) return;
    const pending = addMsg("assistant", "pulling IKEA inspiration for “" + query + "”…", true);
    setBusy(true);
    try {
      const r = await fetch("api/inspire-ikea", {method: "POST",
        headers: {"Content-Type": "application/json"}, body: JSON.stringify({query})});
      const body = await r.json();
      pending.remove();
      addMsg("assistant", body.reply ?? body.error ?? "(no reply)");
      if (body.images && body.images.length) addImageRow(body.images);
      if (body.state) applyState(body.state);
    } catch (exc) { pending.remove(); addMsg("assistant", "error: " + exc); }
    setBusy(false);
  });
  tools.append(inspire);
  const apt = document.createElement("button");
  apt.textContent = "🏠 apartment view";
  apt.title = "generate a 3D cutaway image of the whole furnished apartment";
  apt.addEventListener("click", async () => {
    if (busy) return;
    const pending = addMsg("assistant", "rendering the apartment view…", true);
    setBusy(true);
    try {
      const r = await fetch("api/apartment-image", {method: "POST",
        headers: {"Content-Type": "application/json"}, body: "{}"});
      const body = await r.json();
      pending.remove();
      if (body.error) addMsg("assistant", "error: " + body.error);
      else {
        addMsg("assistant", "here's the whole apartment — click the thumbnail to enlarge");
        applyState(body.state);
        showOverlay(body.image + "?t=" + Date.now());
      }
    } catch (exc) { pending.remove(); addMsg("assistant", "error: " + exc); }
    setBusy(false);
  });
  tools.append(apt);
  s.rooms.forEach(room => {
    const b = document.createElement("button");
    b.textContent = "📷 " + room;
    b.title = "generate a photo of " + room;
    b.addEventListener("click", () => roomImage(room));
    tools.append(b);
  });
}

function addMsg(role, text, pending = false) {
  const el = document.createElement("div");
  el.className = "msg " + role + (pending ? " pending" : "");
  el.textContent = text;
  $("chat").append(el);
  $("chat").scrollTop = $("chat").scrollHeight;
  return el;
}

function showOverlay(src) {
  const overlay = document.createElement("div");
  overlay.id = "overlay";
  const img = document.createElement("img");
  img.src = src;
  overlay.append(img);
  overlay.addEventListener("click", () => overlay.remove());
  document.body.append(overlay);
}

function setBusy(value) {
  busy = value;
  $("send").disabled = value;
}

function noImgPlaceholder(text) {
  const ph = document.createElement("div");
  ph.className = "noimg";
  ph.textContent = text;
  return ph;
}

function itemThumb(item) {
  const wrap = document.createElement("div");
  wrap.className = "item";
  if (item.image) {
    const img = document.createElement("img");
    img.src = item.image;
    img.loading = "lazy";
    img.title = `${item.name} — ${item.dims}`;
    img.addEventListener("click", () => showOverlay(item.image));
    img.onerror = () => img.replaceWith(noImgPlaceholder(item.name));  // proxy miss -> label
    wrap.append(img);
  } else {
    wrap.append(noImgPlaceholder(item.name));
  }
  const cap = document.createElement("div");
  cap.textContent = `${item.name} · ${Math.round(item.price)} ${item.currency}`;
  wrap.append(cap);
  return wrap;
}

function addOptionCards(options) {
  const buttons = [];
  options.forEach((option, i) => {
    const card = document.createElement("div");
    card.className = "optionCard";
    const h = document.createElement("h4");
    h.textContent = `${i + 1}. ${option.label}`;
    const total = document.createElement("div");
    total.className = "total";
    total.textContent = `${Math.round(option.total)} ${option.currency}` +
      (option.rationale ? " — " + option.rationale : "");
    const items = document.createElement("div");
    items.className = "items";
    option.items.forEach(item => items.append(itemThumb(item)));
    const btn = document.createElement("button");
    btn.textContent = "choose " + option.label;
    buttons.push(btn);
    let mini = null;
    if (option.svg) {
      mini = document.createElement("div");
      mini.className = "mini";
      mini.innerHTML = option.svg;
      if (option.placed < option.requested) {
        const note = document.createElement("div");
        note.className = "miniNote";
        note.textContent = `${option.placed}/${option.requested} pieces fit`;
        mini.append(note);
      }
    }
    btn.addEventListener("click", async () => {
      if (busy) return;
      buttons.forEach(b => b.disabled = true);
      const pending = addMsg("assistant", "placing the furniture…", true);
      setBusy(true);
      try {
        const r = await fetch("api/choose", {method: "POST",
          headers: {"Content-Type": "application/json"}, body: JSON.stringify({index: i})});
        const body = await r.json();
        pending.remove();
        addMsg("assistant", body.reply ?? "(no reply)");
        if (body.placed) addThumbRow(body.placed);
        if (body.state) applyState(body.state);
      } catch (exc) { pending.remove(); addMsg("assistant", "error: " + exc); }
      setBusy(false);
    });
    card.append(h, total);
    if (mini) card.append(mini);
    card.append(items, btn);
    $("chat").append(card);
  });
  $("chat").scrollTop = $("chat").scrollHeight;
}

function addThumbRow(items) {
  const row = document.createElement("div");
  row.className = "thumbRow";
  items.filter(i => i.image).forEach(item => {
    const img = document.createElement("img");
    img.src = item.image;
    img.title = item.name;
    img.addEventListener("click", () => showOverlay(item.image));
    img.onerror = () => img.remove();  // drop a broken thumb rather than show a broken icon
    row.append(img);
  });
  if (row.children.length) {
    $("chat").append(row);
    $("chat").scrollTop = $("chat").scrollHeight;
  }
}

function addImageRow(urls) {
  // local inspiration photos — served same-origin, so no referrerPolicy dance needed
  const row = document.createElement("div");
  row.className = "thumbRow";
  urls.forEach(url => {
    const img = document.createElement("img");
    img.src = url;
    img.loading = "lazy";
    img.onerror = () => img.remove();
    img.addEventListener("click", () => showOverlay(url));
    row.append(img);
  });
  if (row.children.length) {
    $("chat").append(row);
    $("chat").scrollTop = $("chat").scrollHeight;
  }
}

function sendText(text) {  // programmatic send (e.g. the piece "replace" button)
  if (busy || !text) return;
  $("input").value = text;
  send();
}

async function send() {
  const text = $("input").value.trim();
  if (!text || busy) return;
  $("input").value = "";
  addMsg("user", text);
  const pending = addMsg("assistant", "thinking…", true);
  setBusy(true);
  try {
    const resp = await fetch("api/message", {method: "POST",
      headers: {"Content-Type": "application/json"}, body: JSON.stringify({text})});
    // NDJSON stream: progress lines update the pending bubble, last line is the result
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = "", final = null;
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});
      let nl;
      while ((nl = buf.indexOf("\n")) >= 0) {
        const line = buf.slice(0, nl).trim();
        buf = buf.slice(nl + 1);
        if (!line) continue;
        const obj = JSON.parse(line);
        if (obj.progress) pending.textContent = obj.progress;
        else final = obj;
      }
    }
    pending.remove();
    if (final) {
      addMsg("assistant", final.reply ?? final.error ?? "(no reply)");
      if (final.options) addOptionCards(final.options);
      if (final.placed) addThumbRow(final.placed);
      if (final.state) applyState(final.state);
    }
  } catch (exc) {
    pending.remove();
    addMsg("assistant", "error: " + exc);
  }
  setBusy(false);
}

async function roomImage(room) {
  if (busy) return;
  const pending = addMsg("assistant", "photographing " + room + "…", true);
  setBusy(true);
  try {
    const resp = await fetch("api/room-image", {method: "POST",
      headers: {"Content-Type": "application/json"}, body: JSON.stringify({room})});
    const body = await resp.json();
    pending.remove();
    if (body.error) addMsg("assistant", "error: " + body.error);
    else {
      addMsg("assistant", "here's " + room + " — click the thumbnail to enlarge");
      applyState(body.state);
      showOverlay(body.image + "?t=" + Date.now());
    }
  } catch (exc) {
    pending.remove();
    addMsg("assistant", "error: " + exc);
  }
  setBusy(false);
}

$("send").addEventListener("click", send);
$("input").addEventListener("keydown", e => { if (e.key === "Enter") send(); });

(async function init() {
  const resp = await fetch("api/state");
  const s = await resp.json();
  applyState(s);
  (s.chat || []).forEach(entry => addMsg(entry.role, entry.text));
  if (!(s.chat || []).length) {
    addMsg("assistant",
      "Hi! Tell me a budget and which room to furnish — e.g. \"set a budget of 1500\" then " +
      "\"furnish the bedroom, scandinavian, cozy\". Use the 📷 buttons for room photos.");
  }
})();
